name: Refresh Bankier data

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Optional stock symbol, e.g. EUVIC'
        required: false
        type: string
      comment_limit:
        description: 'How many latest comments to save'
        required: false
        default: '5'
        type: string
      stock_preset:
        description: 'Refresh configured symbols or a top-20 preset'
        required: false
        default: 'configured'
        type: choice
        options:
          - configured
          - top20
  schedule:
    - cron: '15 */6 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      STOCK_SYMBOL: ${{ github.event.inputs.symbol }}
      COMMENT_LIMIT: ${{ github.event.inputs.comment_limit || '5' }}
      STOCK_PRESET: ${{ github.event.inputs.stock_preset || 'configured' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh selected symbol or all configured symbols
        run: |
          if [ -n "$STOCK_SYMBOL" ]; then
            npm run refresh:one -- "$STOCK_SYMBOL" "$COMMENT_LIMIT"
          else
            node scripts/refresh-all.js "$COMMENT_LIMIT" "$STOCK_PRESET"
          fi
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/stocks/*.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh Bankier data"
          git push
